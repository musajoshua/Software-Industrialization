services:
  mysql:
    image: mysql:8
    container_name: mysql
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_ROOT_HOST=%
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - my_new_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-uroot", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 30s

  flaskapp1:
    image: docker.io/musajoshua/flaskapp:v1.0.14
    restart: always
    container_name: flaskapp1
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=root
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8001:8000"
    networks:
      - my_new_network

  flaskapp2:
    image: docker.io/musajoshua/flaskapp:${FLASK_TAG}
    restart: always
    container_name: flaskapp2
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=root
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8002:8000"
    networks:
      - my_new_network

networks:
  my_new_network:

volumes:
  mysql_data:

